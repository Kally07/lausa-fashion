<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial, sans-serif; background-color: #f7f7f7; margin: 0; padding: 0; }
    .container { max-width: 600px; margin: 20px auto; background: #ffffff; padding: 20px; border-radius: 8px; }
    .header { text-align: center; padding-bottom: 20px; }
    .btn { display: inline-block; padding: 10px 20px; background-color: #ff6600; color: #fff; text-decoration: none; border-radius: 5px; margin-top: 20px; }
    .footer { font-size: 12px; color: #888; text-align: center; margin-top: 30px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h2>Bienvenue sur Lausa Fashion, {{ user.first_name }} ! 🎉</h2>
    </div>
    <p>Merci de vous être inscrit sur notre site. Vous pouvez dès maintenant profiter de toutes nos fonctionnalités.</p>
    <p>Pour commencer, connectez-vous et explorez nos collections.</p>
    <p><a href="https://www.lausa-fashion.com/login" class="btn">Se connecter</a></p>
    <div class="footer">
      &copy; {{ now.year }} Lausa Fashion. Tous droits réservés.
    </div>
  </div>
</body>
</html>
