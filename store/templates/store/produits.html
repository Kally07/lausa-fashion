{% extends 'store/base.html' %}
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Liste des produits</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  {% block content %}
    <div class="container mt-5">
      <h2>Produits disponibles</h2>
      <div class="row">
        {% for produit in produits %}
        <div class="col-md-3 mb-3">
          <div class="card">
            {% if produit.image %}
              <img src="{{ produit.image.url }}" class="card-img-top" alt="{{ produit.nom }}" style="height:200px; object-fit:cover; border-top-left-radius: .75rem; border-top-right-radius: .75rem;">
            {% endif %}
            <div class="card-body">
              <h5 class="card-title">{{ produit.nom }}</h5>
              <p class="card-text">{{ produit.prix }} HTG</p>
              <button 
                class="btn btn-outline-primary mt-auto ajouter-panier-btn"
                data-bs-toggle="modal"
                data-bs-target="#ajouterPanierModal"
                data-produit-id="{{ produit.id }}"
                data-stock="{{ produit.stock }}">
                Ajouter au panier
              </button>
            </div>
          </div>
        </div>
        {% endfor %}
      </div>
    </div>
  {% endblock %}
</body>
</html>
