{% extends 'dashboard/base.html' %}

{% block title %}Supprimer utilisateur{% endblock %}

{% block content %}
<h2>Supprimer Utilisateur</h2>
<p>Voulez-vous vraiment supprimer l’utilisateur <strong>{{ utilisateur.username }}</strong> ?</p>

<form method="POST">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Supprimer</button>
    <a href="{% url 'dashboard:utilisateurs_liste' %}" class="btn btn-secondary">Annuler</a>
</form>
{% endblock %}
