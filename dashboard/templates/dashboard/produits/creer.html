{% extends 'dashboard/base.html' %}

{% block title %}Créer / Ajouter Produit{% endblock %}

{% block content %}
<h2>Créer ou Ajouter au stock</h2>

<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}

    <!-- Sélection produit existant -->
    <div class="mb-3">
        <label>Produit existant (optionnel)</label>
        <select name="produit_existant_id" class="form-select">
            <option value="">-- Nouveau produit --</option>
            {% for prod in produits %}
                <option value="{{ prod.id }}">{{ prod.nom }} (Stock: {{ prod.stock }})</option>
            {% endfor %}
        </select>
    </div>

    <!-- Si produit nouveau, saisir nom -->
    <div class="mb-3">
        <label>Nom du produit</label>
        <input type="text" name="nom" class="form-control" value="">
    </div>

    <div class="mb-3">
        <label>Prix</label>
        <input type="number" step="0.01" name="prix" class="form-control" value="">
    </div>

    <div class="mb-3">
        <label>Quantité / Stock</label>
        <input type="number" name="stock" class="form-control" value="0">
    </div>

    <div class="mb-3">
        <label>Sous-Catégorie</label>
        <select name="sous_categorie_id" class="form-select">
            <option value="">-- Choisi une sous-categorie --</option>
            {% for sous_cat in sous_categories %}
                <option value="{{ sous_cat.id }}">{{ sous_cat.nom }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="mb-3">
        <label>Description</label>
        <textarea name="description" class="form-control" rows="3"></textarea>
    </div>

    <div class="mb-3">
        <label>Image</label>
        <input type="file" name="image" class="form-control">
    </div>

    <button type="submit" class="btn btn-success">Valider</button>
    <a href="{% url 'dashboard:produits_liste' %}" class="btn btn-secondary">Annuler</a>
</form>

<script>
document.addEventListener("DOMContentLoaded", function() {
    const selectProduit = document.querySelector("select[name='produit_existant_id']");
    const nomInput = document.querySelector("input[name='nom']");
    const prixInput = document.querySelector("input[name='prix']");

    function toggleFields() {
        if (selectProduit.value) {
            // Produit existant choisi → désactiver nom et prix
            nomInput.disabled = true;
            prixInput.disabled = true;
        } else {
            // Nouveau produit → activer nom et prix
            nomInput.disabled = false;
            prixInput.disabled = false;
        }
    }

    // Initial check au chargement
    toggleFields();

    // Écoute du changement de sélection
    selectProduit.addEventListener("change", toggleFields);
});
</script>

{% endblock %}
