{% extends 'dashboard/base.html' %}

{% block title %}Modifier Produit{% endblock %}

{% block content %}
<h2>Modifier Produit</h2>

<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}

    <div class="mb-3">
        <label>Nom</label>
        <input type="text" name="nom" class="form-control" value="{{ produit.nom }}" required>
    </div>

    <div class="mb-3">
        <label>Prix</label>
        <input type="number" step="0.01" name="prix" class="form-control" value="{{ produit.prix }}" required>
    </div>

    <div class="mb-3">
        <label>Stock</label>
        <input type="number" name="stock" class="form-control" value="{{ produit.stock }}" required>
    </div>

    <div class="mb-3">
        <label>Sous-Catégorie</label>
        <select name="sous_categorie_id" class="form-select">
            <option value="">-- Aucune --</option>
            {% for cat in sous_categories %}
                <option value="{{ cat.id }}" {% if produit.sous_categorie and produit.sous_categorie.id == cat.id %}selected{% endif %}>
                    {{ cat.nom }}
                </option>
            {% endfor %}
        </select>
    </div>

    <div class="mb-3">
        <label>Image</label>
        <input type="file" name="image" class="form-control">
        {% if produit.image %}
            <img src="{{ produit.image.url }}" alt="{{ produit.nom }}" class="img-thumbnail mt-2" width="100">
        {% endif %}
    </div>

    <button type="submit" class="btn btn-success">Enregistrer</button>
    <a href="{% url 'dashboard:produits_liste' %}" class="btn btn-secondary">Annuler</a>
</form>
{% endblock %}
