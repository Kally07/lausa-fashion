{% extends "dashboard/base.html" %}

{% block title %}Créer un client{% endblock %}

{% block content %}
<h4 class="fw-bold py-3 mb-4">Créer un Nouveau Client</h4>

<form method="POST">
    {% csrf_token %}

    <div class="mb-3">
        <label for="username" class="form-label">Nom d'utilisateur</label>
        <input type="text" name="username" id="username" class="form-control" required>
    </div>

    <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input type="email" name="email" id="email" class="form-control">
    </div>

    <div class="mb-3">
        <label for="password" class="form-label">Mot de passe</label>
        <input type="password" name="password" id="password" class="form-control" required>
    </div>

    <div class="mb-3">
        <label for="nom" class="form-label">Nom</label>
        <input type="text" name="nom" id="nom" class="form-control">
    </div>

    <div class="mb-3">
        <label for="prenom" class="form-label">Prénom</label>
        <input type="text" name="prenom" id="prenom" class="form-control">
    </div>

    <div class="mb-3">
        <label for="telephone" class="form-label">Téléphone</label>
        <input type="text" name="telephone" id="telephone" class="form-control">
    </div>

    <div class="mb-3">
        <label for="adresse" class="form-label">Adresse</label>
        <textarea name="adresse" id="adresse" class="form-control"></textarea>
    </div>

    <div class="mt-4">
        <button type="submit" class="btn btn-success">Créer le client</button>
        <a href="{% url 'dashboard:clients_liste' %}" class="btn btn-secondary">Annuler</a>
    </div>
</form>
{% endblock %}
