{% extends "dashboard/base.html" %}

{% block title %}Créer un nouveau livreur{% endblock %}

{% block content %}
<h3>Créer un nouveau livreur</h3>

<form method="post">
    {% csrf_token %}
    <div class="mb-3">
        <label for="username">Username</label>
        <input type="text" name="username" id="username" class="form-control" required>
    </div>

    <div class="mb-3">
        <label for="password">Mot de passe</label>
        <input type="password" name="password" id="password" class="form-control" required>
    </div>

    <div class="mb-3">
        <label for="email">Email</label>
        <input type="email" name="email" id="email" class="form-control">
    </div>

    <div class="mb-3">
        <label for="telephone">Téléphone</label>
        <input type="text" name="telephone" id="telephone" class="form-control">
    </div>

    <div class="mb-3">
        <label for="moyen_transport">Moyen de transport</label>
        <input type="text" name="moyen_transport" id="moyen_transport" class="form-control">
    </div>

    <button type="submit" class="btn btn-primary">Créer</button>
    <a href="{% url 'dashboard:livreurs_liste' %}" class="btn btn-secondary">Annuler</a>
</form>
{% endblock %}
