{% extends "dashboard/base.html" %}

{% block title %}Créer une Livraison{% endblock %}

{% block content %}
<h4 class="fw-bold py-3 mb-4">Créer une Nouvelle Livraison</h4>

<form method="POST">
    {% csrf_token %}

    <!-- Sélection du livreur -->
    <div class="mb-3">
        <label for="livreur_id" class="form-label">Choisir un livreur</label>
        <select name="livreur_id" id="livreur_id" class="form-select" required>
            <option value="">-- Sélectionner --</option>
            {% for livreur in livreurs %}
                <option value="{{ livreur.id }}">
                    {{ livreur.utilisateur.nom }} {{ livreur.utilisateur.prenom }} ({{ livreur.utilisateur.username }})
                </option>
            {% empty %}
                <option value="">Aucun livreur disponible</option>
            {% endfor %}
        </select>
    </div>

    <!-- Sélection des commandes -->
    <div class="mb-3">
        <label class="form-label">Choisir les commandes</label>
        {% for commande in commandes %}
            <div class="form-check">
                <input class="form-check-input" type="checkbox" name="commandes" value="{{ commande.id }}" id="commande{{ commande.id }}">
                <label class="form-check-label" for="commande{{ commande.id }}">
                    {{ commande.date_commande|date:"d/m/Y H:i" }} - {{ commande.adresse }} - {{ commande.user.username }}
                </label>
            </div>
        {% empty %}
            <p class="text-muted">Aucune commande disponible.</p>
        {% endfor %}
    </div>

    <!-- Boutons -->
    <div class="mt-4">
        <button type="submit" class="btn btn-success">Créer la Livraison</button>
        <a href="{% url 'dashboard:livraisons_liste' %}" class="btn btn-secondary">Annuler</a>
    </div>
</form>
{% endblock %}
